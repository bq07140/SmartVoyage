<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基于A2A的SmartVoyage旅行助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* Header */
        .header {
            background: #16213e;
            padding: 16px 24px;
            border-bottom: 1px solid #0f3460;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header h1 { font-size: 20px; color: #e94560; }
        .header p { font-size: 13px; color: #888; }

        /* Layout */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        /* Chat Area */
        .chat-area {
            flex: 2;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #0f3460;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .message {
            margin-bottom: 16px;
            display: flex;
        }
        .message.user { justify-content: flex-end; }
        .message.assistant { justify-content: flex-start; }
        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .message.user .message-bubble {
            background: #0f3460;
            color: #e0e0e0;
            border-bottom-right-radius: 4px;
        }
        .message.assistant .message-bubble {
            background: #16213e;
            color: #e0e0e0;
            border-bottom-left-radius: 4px;
            border: 1px solid #0f3460;
        }
        /* Input Area */
        .chat-input-area {
            padding: 16px 20px;
            background: #16213e;
            border-top: 1px solid #0f3460;
            display: flex;
            gap: 10px;
        }
        .chat-input-area input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #0f3460;
            background: #1a1a2e;
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
        }
        .chat-input-area input:focus { border-color: #e94560; }
        .chat-input-area button {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            background: #e94560;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .chat-input-area button:hover { background: #c73550; }
        .chat-input-area button:disabled { background: #555; cursor: not-allowed; }

        /* Sidebar */
        .sidebar {
            flex: 1;
            max-width: 380px;
            overflow-y: auto;
            padding: 16px;
            background: #16213e;
        }
        .section-title {
            font-size: 15px;
            font-weight: 600;
            color: #e94560;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #0f3460;
        }
        .agent-card, .memory-item {
            background: #1a1a2e;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #0f3460;
        }
        .agent-card h3 { font-size: 13px; color: #e0e0e0; margin-bottom: 6px; }
        .agent-card p { font-size: 12px; color: #888; margin-bottom: 4px; }
        .agent-card .skill { font-size: 11px; color: #aaa; padding: 2px 0; }
        .agent-card .status { font-size: 11px; color: #4caf50; }
        .memory-section { margin-bottom: 16px; }
        .memory-section summary {
            cursor: pointer;
            font-size: 13px;
            color: #ccc;
            padding: 6px 0;
        }
        .memory-section summary:hover { color: #e94560; }
        .memory-item p { font-size: 12px; color: #aaa; margin-bottom: 4px; }
        .memory-item .timestamp { font-size: 10px; color: #666; }

        /* Clear Button */
        .clear-btn {
            width: 100%;
            padding: 8px;
            margin-top: 12px;
            margin-bottom: 16px;
            border-radius: 6px;
            border: 1px solid #e94560;
            background: transparent;
            color: #e94560;
            font-size: 12px;
            cursor: pointer;
        }
        .clear-btn:hover { background: #e94560; color: white; }

        /* Loading */
        .loading { color: #888; font-size: 13px; text-align: center; padding: 12px; }
        .typing-indicator { display: inline-flex; gap: 4px; align-items: center; }
        .typing-indicator span {
            width: 6px; height: 6px; background: #888; border-radius: 50%;
            animation: blink 1.4s infinite both;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0%, 80%, 100% { opacity: 0; }
            40% { opacity: 1; }
        }

        /* Footer */
        .footer {
            background: #16213e;
            text-align: center;
            padding: 8px;
            font-size: 12px;
            color: #666;
            border-top: 1px solid #0f3460;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1a1a2e; }
        ::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>SmartVoyage</h1>
        <p>基于A2A的旅行智能助手系统</p>
    </div>

    <div class="main">
        <!-- Chat Area -->
        <div class="chat-area">
            <div class="chat-messages" id="chatMessages">
                <div class="loading">欢迎体验智能对话！输入问题即可开始</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="请输入您的问题..." autocomplete="off">
                <button id="sendBtn" onclick="sendMessage()">发送</button>
            </div>
        </div>

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="section-title">Agent Cards</div>
            <div id="agentCards"></div>

            <button class="clear-btn" onclick="clearMemory()">清空记忆</button>

            <div class="section-title">Memory</div>
            <div id="memoryPanel">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <div class="footer">Powered by 黑马程序员 | 基于Agent2Agent的旅行助手系统 v4.0</div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');

        // Enter key to send
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function addMessage(role, content) {
            // Remove loading indicator
            const loading = chatMessages.querySelector('.loading');
            if (loading) loading.remove();

            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `<div class="message-bubble">${escapeHtml(content)}</div>`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.id = 'typingIndicator';
            div.innerHTML = `<div class="message-bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function hideTyping() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            chatInput.value = '';
            sendBtn.disabled = true;
            addMessage('user', text);
            showTyping();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                hideTyping();
                addMessage('assistant', data.message);
            } catch (err) {
                hideTyping();
                addMessage('assistant', '请求失败，请检查网络连接。');
            } finally {
                sendBtn.disabled = false;
                chatInput.focus();
            }

            // Refresh sidebar
            loadMemory();
        }

        async function loadAgents() {
            try {
                const response = await fetch('/api/agents');
                const data = await response.json();
                const container = document.getElementById('agentCards');
                container.innerHTML = data.data.map(agent => `
                    <div class="agent-card">
                        <h3>${escapeHtml(agent.name)}</h3>
                        <p>${escapeHtml(agent.description)}</p>
                        ${agent.skills.map(s => `<div class="skill">• ${escapeHtml(s)}</div>`).join('')}
                        <div class="status">● ${escapeHtml(agent.status)}</div>
                    </div>
                `).join('');
            } catch (err) {
                console.error('Failed to load agents:', err);
            }
        }

        async function loadMemory() {
            try {
                const response = await fetch('/api/memory');
                const data = await response.json();
                const m = data.data;
                const container = document.getElementById('memoryPanel');
                container.innerHTML = `
                    <details class="memory-section" open>
                        <summary>短期对话</summary>
                        ${m.short_term_messages.map(msg => `
                            <div class="memory-item">
                                <p><strong>${escapeHtml(msg.role)}:</strong> ${escapeHtml(msg.content)}</p>
                                <div class="timestamp">${escapeHtml(msg.timestamp)}</div>
                            </div>
                        `).join('') || '<div class="memory-item"><p>无</p></div>'}
                    </details>
                    <details class="memory-section">
                        <summary>用户偏好</summary>
                        ${Object.keys(m.user_profile).length > 0
                            ? Object.entries(m.user_profile).map(([k, v]) => `
                                <div class="memory-item"><p><strong>${escapeHtml(k)}:</strong> ${escapeHtml(v)}</p></div>
                            `).join('')
                            : '<div class="memory-item"><p>无</p></div>'}
                    </details>
                    <details class="memory-section">
                        <summary>当前任务</summary>
                        ${Object.keys(m.current_task).length > 0
                            ? Object.entries(m.current_task).map(([k, v]) => `
                                <div class="memory-item"><p><strong>${escapeHtml(k)}:</strong> ${escapeHtml(v)}</p></div>
                            `).join('')
                            : '<div class="memory-item"><p>无</p></div>'}
                    </details>
                    <details class="memory-section">
                        <summary>查询历史</summary>
                        ${m.entity_history.map(e => `
                            <div class="memory-item">
                                <p><strong>${escapeHtml(e.type)}:</strong> ${escapeHtml(e.query)}</p>
                                <div class="timestamp">${escapeHtml(e.timestamp)}</div>
                            </div>
                        `).join('') || '<div class="memory-item"><p>无</p></div>'}
                    </details>
                `;
            } catch (err) {
                console.error('Failed to load memory:', err);
            }
        }

        async function clearMemory() {
            if (!confirm('确定要清空所有记忆吗？')) return;
            try {
                await fetch('/api/memory/clear', { method: 'POST' });
                chatMessages.innerHTML = '<div class="loading">记忆已清空，欢迎体验智能对话！</div>';
                loadMemory();
            } catch (err) {
                console.error('Failed to clear memory:', err);
            }
        }

        // Initial load
        loadAgents();
        loadMemory();
    </script>
</body>
</html>
